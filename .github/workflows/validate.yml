name: Validate hosted workspace

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  typecheck-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
      - run: corepack enable
      - run: corepack pnpm install --frozen-lockfile
      - run: corepack pnpm typecheck
      - run: corepack pnpm --filter @open-design/web build
